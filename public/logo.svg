<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer eye shape -->
  <path d="M10 60 C30 25, 90 25, 110 60 C90 95, 30 95, 10 60 Z" fill="#1e293b" stroke="#60a5fa" stroke-width="3"/>

  <!-- Iris -->
  <circle cx="60" cy="60" r="22" fill="#1d4ed8"/>

  <!-- Iris texture rings -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <circle cx="60" cy="60" r="17" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="60" cy="60" r="12" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="2 2"/>

  <!-- Iris radial lines -->
  <line x1="60" y1="38" x2="60" y2="44" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="76" x2="60" y2="82" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="38" y1="60" x2="44" y2="60" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="76" y1="60" x2="82" y2="60" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="44.5" y1="44.5" x2="48.7" y2="48.7" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="71.3" y1="71.3" x2="75.5" y2="75.5" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="75.5" y1="44.5" x2="71.3" y2="48.7" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  <line x1="48.7" y1="71.3" x2="44.5" y2="75.5" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="60" cy="60" r="9" fill="#0f172a"/>

  <!-- Pupil highlight -->
  <circle cx="55" cy="55" r="3" fill="white" opacity="0.35"/>
  <circle cx="65" cy="63" r="1.5" fill="white" opacity="0.2"/>

  <!-- Eyelid edge glow -->
  <path d="M10 60 C30 25, 90 25, 110 60" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
</svg>
